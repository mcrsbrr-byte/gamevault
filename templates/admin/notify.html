{% extends "base.html" %}
{% block title %}Notificar Usuários — Admin{% endblock %}
{% block content %}
<div class="admin-layout">
  {% include "admin/sidebar.html" %}
  <div class="admin-content">
    <div class="admin-page-title"><i class="fas fa-bell"></i> Enviar Notificação</div>
    <div class="form-card" style="max-width:600px">
      <p style="color:var(--text3);margin-bottom:1.5rem">Envie uma notificação para todos os usuários cadastrados no site.</p>
      <form method="post">
        <div class="form-group">
          <label class="form-label">Título da notificação</label>
          <input type="text" name="title" class="form-input" required placeholder="Ex: 🔥 Promoção especial!">
        </div>
        <div class="form-group">
          <label class="form-label">Mensagem</label>
          <textarea name="message" class="form-textarea" required placeholder="Detalhes da notificação..." rows="4"></textarea>
        </div>
        <div class="form-group">
          <label class="form-check">
            <input type="checkbox" name="send_email" checked>
            <span>Também enviar por e-mail para todos os usuários</span>
          </label>
        </div>
        <button type="submit" class="btn btn-gold btn-lg">
          <i class="fas fa-paper-plane"></i> Enviar para Todos
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
