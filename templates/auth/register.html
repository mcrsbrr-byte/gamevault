{% extends "base.html" %}
{% block title %}Criar Conta — GameVault{% endblock %}
{% block content %}
<div class="container" style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem">
  <div class="form-card" style="width:100%">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🎮</div>
      <h1 class="form-title">Criar Conta</h1>
      <p class="form-subtitle">Junte-se a milhares de gamers</p>
    </div>

    <form method="post">
      <div class="form-group">
        <label class="form-label">Nome completo</label>
        <input type="text" name="name" class="form-input" placeholder="Seu nome" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" name="email" class="form-input" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Senha</label>
        <input type="password" name="password" class="form-input" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar senha</label>
        <input type="password" name="password2" class="form-input" placeholder="Repita a senha" required>
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="newsletter" checked>
          <span style="font-size:0.875rem;color:var(--text2)">Quero receber promoções e novidades por e-mail</span>
        </label>
      </div>
      <button type="submit" class="btn btn-gold btn-full">
        <i class="fas fa-user-plus"></i> Criar Conta Grátis
      </button>
    </form>

    <div class="form-divider">já tem conta?</div>
    <a href="{{ url_for('login') }}" class="btn btn-outline btn-full">
      <i class="fas fa-sign-in-alt"></i> Entrar
    </a>

    <div style="background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.2);border-radius:var(--radius-sm);padding:0.75rem;margin-top:1rem;font-size:0.8rem;text-align:center">
      🎁 Use <strong style="color:var(--gold)">PRIMEIRACOMPRA</strong> e ganhe 15% OFF no primeiro pedido!
    </div>
  </div>
</div>
{% endblock %}
