{% extends "base.html" %}
{% block title %}Editar Perfil — GameVault{% endblock %}
{% block content %}
<div class="container section" style="max-width:600px">
  <h1 class="section-title" style="margin-bottom:1.5rem">⚙️ <span>Editar Perfil</span></h1>
  <div class="form-card form-card-wide">
    <form method="post" enctype="multipart/form-data">
      <div style="text-align:center;margin-bottom:1.5rem">
        <div class="sidebar-avatar" style="margin:0 auto 0.75rem">
          {% if user.avatar %}
          <img src="{{ url_for('static', filename='uploads/avatars/'+user.avatar) }}" alt="Avatar" id="avatarPreview">
          {% else %}
          <span id="avatarPreview">{{ user.name[0].upper() }}</span>
          {% endif %}
        </div>
        <label class="btn btn-outline btn-sm" style="cursor:pointer">
          <i class="fas fa-camera"></i> Alterar foto
          <input type="file" name="avatar" accept="image/*" data-preview="avatarPreviewImg" style="display:none" onchange="previewAvatar(this)">
        </label>
        <img id="avatarPreviewImg" style="display:none;width:80px;height:80px;border-radius:50%;object-fit:cover;margin:0.5rem auto 0;display:none">
      </div>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" name="name" class="form-input" value="{{ user.name }}" required>
      </div>
      <div class="form-group">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-input" value="{{ user.email }}" disabled style="opacity:0.5">
        <p class="form-hint">O e-mail não pode ser alterado.</p>
      </div>
      <div class="form-group">
        <label class="form-label">Nova senha (deixe em branco para manter)</label>
        <input type="password" name="password" class="form-input" placeholder="Nova senha" minlength="6">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar nova senha</label>
        <input type="password" name="password2" class="form-input" placeholder="Repita a nova senha">
      </div>
      <div class="form-group">
        <label class="form-check">
          <input type="checkbox" name="newsletter" {% if user.newsletter %}checked{% endif %}>
          <span style="font-size:0.875rem;color:var(--text2)">Receber novidades por e-mail</span>
        </label>
      </div>
      <div style="display:flex;gap:0.75rem">
        <button type="submit" class="btn btn-gold">Salvar Alterações</button>
        <a href="{{ url_for('my_account') }}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
<script>
function previewAvatar(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('avatarPreviewImg');
      img.src = e.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
